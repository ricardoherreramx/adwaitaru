    <style type="text/css">
      a[data-tooltip="Mimetypes"] {background-color: #4B4B4B;pointer-events: none}
      #panel svg {fill: white}
      body {
      display: grid;
      grid-template-columns: max-content 1fr;
      grid-template-rows: 32px 46px 1fr;
      grid-template-areas:
      "header header"
      "sidebar main"
      "sidebar main";
      }
      #panel {
      position: initial;
      grid-area: header;
      }
      aside {
      height: 100%;
      padding: 6px;
      display: flex;
      flex-flow: column nowrap;
      background-color: #303030;
      grid-area: sidebar;
      padding-top: 52px;
      gap: 2px;
      }
      aside a{
      width: 100%;
      height: 36px;
      padding: 10px;
      }
      aside a > * {
      float: left;
      margin: 0 8px;
      }
      aside img {filter: brightness(140%)}
      header img {
      width: 16px;
      height: 16px;
      filter: brightness(1000%);
      }
      header.window {
      height: 46px;
      padding: 6px;
      display: flex;
      flex-flow: row nowrap;
      align-items: center;
      gap: 6px;
      }
      header.window h2 {
      font-weight: bold;
      font-size: 12pt;
      }
      header.window > img {margin: 9px}
      header.title {grid-area: 2 / 2 / 3 / 3}
      header.title .window {
      width: 24px;
      height: 24px;
      background-color: #343434;
      border-radius: 12px;
      padding: 4px;
      margin: 4px;
      }
      header.sidebar {
      grid-area: 2 / 1 / 3 / 2;
      justify-content: space-between;
      }
      header.nautilus {
      display: grid;
      grid-template-columns: repeat(2, 34px) 1fr repeat(3, 34px);
      }
      main.files {
      flex-flow: row wrap;
      justify-content: space-around;
      padding: 66px 18px 130px;
      grid-area: main;
      row-gap: 12px;
      width: 100%;
      }
      main.files,
      header.title {background-color: #1E1E1E}
      main.files figure {
      border-radius: 12px;
      padding: 6px;
      }
      main.files figcaption {
      text-wrap: wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      }
      main.files > figure.hidden {display: none !important}
      #searchform {
      width: 100%;
      max-width: 820px;
      justify-self: center;
      position: relative;
      }
      #searchbar {
      color: inherit;
      font-family: inherit;
      font-size: inherit;
      width: calc(100% - 40px);
      height: 34px;
      background-color: #343434;
      background-image: url(Adwaitaru/symbolic/actions/search-symbolic.svg);
      background-position: 10px center;
      background-size: 16px 16px;
      background-repeat: no-repeat;
      outline: thin solid transparent;
      border-radius: 6px;
      padding: 0 36px;
      border: none;
      }
      #searchbar::placeholder {color: gray}
      #searchbar:active, #searchbar:focus {outline-color: #C0C0C0}
      #erase {
      right: 40px;
      top: 0;
      width: 34px;
      height: 34px;
      }
      #erase:hover {filter: brightness(140%)}
      @media (max-width: 680px) {
      aside, header.sidebar {
      display: none;
      width: 0;
      }
      }
      @media (min-width: 680px) {
      aside {
      width: 20vw;
      min-width: 180px;
      max-width: 240px;
      }
      }
    </style>
