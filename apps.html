    <script type="text/javascript">
      // Grab the searchbar and all the searchable hyperlinks
      const searchbar = document.getElementById('searchbar');
      const cards = document.querySelectorAll('.app');
      // Listen for user input in the searchbar (fires instantly on every keystroke)
      searchbar.addEventListener('input', function(event) {
        // Convert the user's input to lowercase so the search can be case-agnostic
        const searchTerm = event.target.value.toLowerCase();
        // Loop through every single card to see if it matches
        cards.forEach(function(card) {
          // Fetch the text from the figcaption
          const figcaptionText = card.querySelector('figcaption').textContent.toLowerCase();
          // Fetch the alt text from the image
          const altText = card.querySelector('img').getAttribute('alt').toLowerCase();
          // Check if the search term exists in ANY of the targets
          if (
            figcaptionText.includes(searchTerm) || 
            altText.includes(searchTerm)
          ) {
            // make the hyperlink visible on match
            card.classList.remove('hidden');
          } else {
            // make the hyperlink hidden on mismatch
            card.classList.add('hidden');
          }
        });
      });
      // Grab the form element
      const searchForm = document.getElementById('searchform');
      // Listen for when the clear button is clicked
      searchForm.addEventListener('reset', function() {
        // Loop through all cards and instantly unhide them
        cards.forEach(function(card) {
          card.classList.remove('hidden');
        });
      });
    </script>

      var slider = document.getElementsByTagName('main')[0];
      let scrollLeft;
      // Horizontal Scroll
      window.addEventListener('wheel', function(e) {slider.scrollLeft += e.deltaY});
    </script>
